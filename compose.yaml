services:
###> doctrine/doctrine-bundle ###
  database:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sfb}
      MYSQL_USER: ${MYSQL_USER:-sfb}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sfb}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-root}"]
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - database_data:/var/lib/mysql:rw
###< doctrine/doctrine-bundle ###

###> elasticsearch ###
  elasticsearch:
    image: elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      timeout: 5s
      retries: 20
      start_period: 40s
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data:rw
###< elasticsearch ###

###> redis ###
  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data:rw
###< redis ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
###> elasticsearch ###
  elasticsearch_data:
###< elasticsearch ###
###> redis ###
  redis_data:
###< redis ###
