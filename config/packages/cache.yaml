framework:
    cache:
        # Préfixe stable pour les clés de cache de l'application.
        prefix_seed: sfb/app

        # Le cache applicatif est stocké dans Redis.
        app: cache.adapter.redis
        default_redis_provider: '%env(REDIS_URL)%'

        # Pools dédiés par domaine (namespaces isolés).
        pools:
            cache.members:
                adapter: cache.app
